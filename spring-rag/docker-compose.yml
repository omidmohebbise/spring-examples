version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    restart: always

    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
